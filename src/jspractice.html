<label for="age">Enter your age: </label>
<input type = "number" id = "age" placeholder="Enter your age">
<button onclick="ageCheck()">Check Age</button>
<p id="result"></p>
<!--<button onclick="showName()">Click Me</button>-->
<script>
    function showName() {
        let name = document.getElementById("name").value;
        document.getElementById("demo").innerHTML = "Hello " + name;
    }
    function addNumbers(){
        let num1 = document.getElementById("num1");
        let num2 = document.getElementById("num2");
        let result = parseInt(num1.value) + parseInt(num2.value);
        document.getElementById("result").innerHTML = "The sum is: " + result;
    }
    function ageCheck(){
        let age = document.getElementById("age");
        if(parseInt(age.value) <= 100 && parseInt(age.value) >= 0){
            if(parseInt(age.value) >=18){
                document.getElementById("result").innerHTML="Eligible to vote";
            }
            else {
                document.getElementById("result").innerHTML="Not eligible to vote";
            }

        }
        else{
            document.getElementById("result").innerHTML="Please enter a valid age";
        }

    }
</script>
